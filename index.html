<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoagie Haven — Specialty Ranking Rubric</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e8e8e8; font-size: 16px; }
  input, textarea, button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #555; }
  textarea { outline: none; }
  input:focus { outline: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; }

  /* Setup screen */
  .setup-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  .setup-box {
    width: 100%;
    max-width: 400px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 28px 24px;
    margin-top: 24px;
  }
  .setup-label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .setup-input {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 2px;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 12px;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  .setup-input:focus { border-color: #EF7D00; }
  .setup-input.error { border-color: #c0392b; }
  .btn-primary {
    width: 100%;
    padding: 13px 0;
    background: #EF7D00;
    border: none;
    border-radius: 2px;
    color: #0a0a0a;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 700;
    transition: opacity 0.15s;
  }
  .btn-primary:disabled { background: #222; color: #555; cursor: default; }
  .btn-primary:not(:disabled):hover { opacity: 0.85; }
  .error-msg {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #e05252;
    margin-bottom: 10px;
    margin-top: -8px;
  }
  .info-msg {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #999;
    line-height: 1.8;
    margin-bottom: 14px;
  }
  .info-msg a { color: #EF7D00; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── CONFIG ─────────────────────────────────────────────────────────────────
// Fill these in after creating a free JSONBin account at https://jsonbin.io
// 1. Sign up at jsonbin.io
// 2. Go to API Keys → Create Access Key (copy it here)
// 3. Click "New Bin", paste {} as content, click Create
// 4. Copy the Bin ID from the URL and paste it below
const JSONBIN_API_KEY  = "$2a$10$ie6qGP.UEjZOoJ/MHy834u8ME6oRzQXx0NPB8MHde6bQyo4oxBZkK";   // e.g. "$2a$10$abc..."
const JSONBIN_BIN_ID   = "6a1f2ac5f5f4af5e29aed783";    // e.g. "6650abc123..."
// ────────────────────────────────────────────────────────────────────────────

const SPECIALTIES = [
  { id: "sanchez",          name: "Sanchez",           desc: "Chicken Cutlet, American Cheese, Mozz Sticks, Fries, Sanchez Sauce" },
  { id: "phat_lady",        name: "Phat Lady",         desc: "Cheesesteak, Mozz Sticks, Fries, Ketchup, Hot Sauce" },
  { id: "mac_daddy",        name: "Mac Daddy",         desc: "Bacon Cheeseburger, Mac 'n' Cheese Wedges, Fries, Honey Mustard, Hot Sauce" },
  { id: "heart_stop",       name: "Heart Stop",        desc: "Cheesesteak, Bacon, Eggs, Ketchup, Hot Sauce" },
  { id: "wake_up_call",     name: "Wake-Up Call",      desc: "Cheesesteak, Bacon, Eggs, Hash Brown, Pork Roll, Ketchup, Hot Sauce" },
  { id: "middle_finger",    name: "Middle Finger",     desc: "Grilled Cheese, Chicken Cutlet, Pepperoni, Honey Mustard" },
  { id: "chicken_pachanga", name: "Chicken Pachanga",  desc: "Grilled Chicken, Chicken Tacos, Bacon, Ranch, Hot Sauce" },
  { id: "body_bag",         name: "Body Bag",          desc: "Capicola, Ham, Salami, Provolone, Cheesesteak, Hash Browns, Egg, Ketchup, Hot Sauce" },
  { id: "el_mexicano",      name: "El Mexicano",       desc: "Cheesesteak, Chicken Tacos, Sour Cream, Hot Sauce" },
  { id: "bloch",            name: "Bloch",             desc: "Chicken Parmigiana, Bacon, Eggs" },
  { id: "big_cat",          name: "Big Cat",           desc: "Double Bacon Cheeseburger with Double Eggs" },
  { id: "shrimp_po_boy",    name: "Shrimp Po' Boy",    desc: "Fried Shrimp, Lettuce, Tomato, Tartar Sauce, Hot Sauce" },
  { id: "phat_veg",         name: "Phat Veg (V)",      desc: "Eggplant Parm, Mozz Sticks, Fries, Sanchez Sauce" },
  { id: "haven_5",          name: "Haven 5.0",         desc: "Cheesesteak, Onion Rings, Guacamole Bites, Ranch, Ketchup"}
];

const CRITERIA = [
  { id: "flavor",   label: "Flavor Harmony",    weight: 25, icon: "★", description: "Do the ingredients work together? Are the sauces balanced?",          scale: ["Clashing",    "Some discord",   "Decent",       "Well balanced",  "Harmonious"]     },
  { id: "moisture", label: "Moisture Balance",  weight: 20, icon: "◈", description: "Not too dry, not soggy. The bread should hold up but not disintegrate.", scale: ["Way off",      "Notably off",    "Acceptable",   "Good balance",   "Perfect"]        },
  { id: "texture",  label: "Texture Contrast",  weight: 20, icon: "◇", description: "Crunch vs. soft elements. Do fried add-ons stay crispy?",              scale: ["One-note",     "Limited",        "Some variation","Good contrast",  "Exceptional"]    },
  { id: "bread",    label: "Bread Quality",     weight: 15, icon: "▱", description: "Fresh? Crisp crust, soft interior? Structural integrity under load?",   scale: ["Stale/soggy",  "Subpar",         "Fine",         "Fresh & sturdy", "Perfect vessel"] },
  { id: "value",    label: "Gut Satisfaction",  weight: 10, icon: "◉", description: "Pure visceral satisfaction. Did it hit the spot? Crave it again?",     scale: ["Regret",       "Meh",            "Decent",       "Satisfied",      "Transcendent"]   },
  { id: "concept",  label: "Concept Execution", weight: 10, icon: "◆", description: "Creative and coherent, or a random pile of ingredients?",              scale: ["Incoherent",   "Questionable",   "Makes sense",  "Clever",         "Genius combo"]   },
];

const SCORE_COLORS  = ["#c0392b","#e67e22","#f1c40f","#2ecc71","#27ae60"];
const RATER_COLORS  = ["#EF7D00","#7eb8d4","#d47eb8","#7ed4a0","#d4977e","#a07ed4"];

function raterColor(idx) { return RATER_COLORS[idx % RATER_COLORS.length]; }

function calcScore(ratings) {
  if (!ratings) return null;
  let total = 0, count = 0;
  CRITERIA.forEach(c => { if (ratings[c.id]) { total += (ratings[c.id] / 5) * c.weight; count++; } });
  return count === CRITERIA.length ? total : null;
}

// ─── JSONBin API ─────────────────────────────────────────────────────────────
const configured = () => JSONBIN_API_KEY !== "YOUR_API_KEY_HERE" && JSONBIN_BIN_ID !== "YOUR_BIN_ID_HERE";

async function loadRemote() {
  if (!configured()) return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { "X-Access-Key": JSONBIN_API_KEY }
    });
    const j = await r.json();
    return j.record || null;
  } catch { return null; }
}

async function saveRemote(data) {
  if (!configured()) return;
  await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Access-Key": JSONBIN_API_KEY },
    body: JSON.stringify(data)
  });
}
// ─────────────────────────────────────────────────────────────────────────────

function generateSalt() {
  return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode(salt), iterations: 100000, hash: "SHA-256" }, key, 256);
  return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function Header() {
  return (
    <div style={{ textAlign: "center", marginBottom: 0 }}>
      <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#999", letterSpacing: 3, textTransform: "uppercase", marginBottom: 10 }}>
        242 Nassau St · Princeton, NJ · Est. 1974
      </div>
      <div style={{ fontFamily: "Georgia, serif", fontSize: 36, fontWeight: 700, color: "#EF7D00", letterSpacing: 4, textTransform: "uppercase", marginBottom: 6 }}>
        Hoagie Haven
      </div>
      <div style={{ fontFamily: "'Courier New', monospace", fontSize: 12, color: "#aaa", letterSpacing: 2, textTransform: "uppercase" }}>
        Specialty Ranking Rubric
      </div>
    </div>
  );
}

function SetupScreen({ onReady }) {
  const [step, setStep] = useState(configured() ? "name" : "apikey");
  const [apiKey, setApiKey] = useState("");
  const [binId, setBinId] = useState("");
  const [name, setName] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const passwordRef = useRef(null);

  // If already configured in code, skip straight to name
  const handleConfigSave = async () => {
    if (!apiKey.trim() || !binId.trim()) { setError("Both fields required."); return; }
    setLoading(true);
    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${binId.trim()}/latest`, {
        headers: { "X-Access-Key": apiKey.trim() }
      });
      if (!r.ok) { setError("Could not connect — check your API key and Bin ID."); setLoading(false); return; }
      // Store in sessionStorage for this session
      sessionStorage.setItem("hh_apikey", apiKey.trim());
      sessionStorage.setItem("hh_binid", binId.trim());
      setStep("name");
    } catch { setError("Network error — are you online?"); }
    setLoading(false);
  };

  const handleJoin = async () => {
    const trimmedName = name.trim();
    const trimmedPass = password.trim();
    if (!trimmedName || !trimmedPass) return;
    setLoading(true);
    setError("");

    const ak = configured() ? JSONBIN_API_KEY : sessionStorage.getItem("hh_apikey");
    const bi = configured() ? JSONBIN_BIN_ID  : sessionStorage.getItem("hh_binid");

    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${bi}/latest`, { headers: { "X-Access-Key": ak } });
      if (!r.ok) { setError(`Could not connect (${r.status}) — check your API key and Bin ID.`); setLoading(false); return; }
      const j = await r.json();
      const data = j.record || { raters: [] };
      const raters = data.raters || [];
      const existing = raters.find(r => r.name.toLowerCase() === trimmedName.toLowerCase());

      if (existing) {
        if (existing.passwordHash) {
          const hash = await hashPassword(trimmedPass, existing.salt);
          if (hash !== existing.passwordHash) { setError("Wrong password."); setLoading(false); return; }
          onReady({ id: existing.id, name: existing.name, apiKey: ak, binId: bi, initialData: data });
        } else {
          // Legacy account with no password — first person to claim it sets the password
          const salt = generateSalt();
          const hash = await hashPassword(trimmedPass, salt);
          const newData = { ...data, raters: raters.map(r => r.id === existing.id ? { ...r, passwordHash: hash, salt } : r) };
          const pr = await fetch(`https://api.jsonbin.io/v3/b/${bi}`, { method: "PUT", headers: { "Content-Type": "application/json", "X-Access-Key": ak }, body: JSON.stringify(newData) });
          if (!pr.ok) { setError(`Save failed (${pr.status}) — check your API key and Bin ID.`); setLoading(false); return; }
          onReady({ id: existing.id, name: existing.name, apiKey: ak, binId: bi, initialData: newData });
        }
      } else {
        const salt = generateSalt();
        const hash = await hashPassword(trimmedPass, salt);
        const id = `rater-${Date.now()}`;
        const newData = { ...data, raters: [...raters, { id, name: trimmedName, passwordHash: hash, salt, ratings: {}, notes: {} }] };
        const pr = await fetch(`https://api.jsonbin.io/v3/b/${bi}`, { method: "PUT", headers: { "Content-Type": "application/json", "X-Access-Key": ak }, body: JSON.stringify(newData) });
        if (!pr.ok) { setError(`Save failed (${pr.status}) — check your API key and Bin ID.`); setLoading(false); return; }
        onReady({ id, name: trimmedName, apiKey: ak, binId: bi, initialData: newData });
      }
    } catch { setError("Could not connect. Check your connection."); }
    setLoading(false);
  };

  return (
    <div className="setup-screen">
      <Header />

      {step === "apikey" && (
        <div className="setup-box">
          <div style={{ fontFamily: "Georgia, serif", fontSize: 15, color: "#EF7D00", marginBottom: 14, letterSpacing: 1 }}>Connect a sync backend</div>
          <p className="info-msg">
            This app syncs ratings in real time via <a href="https://jsonbin.io" target="_blank">JSONBin.io</a> (free).
            <br/>1. Sign up at jsonbin.io
            <br/>2. Create an Access Key (API Keys tab)
            <br/>3. Create a New Bin with content <code style={{color:"#EF7D00"}}>&#123;&#125;</code>
            <br/>4. Paste your API key and Bin ID below
          </p>
          <div className="setup-label">JSONBin API Key</div>
          <input className={`setup-input${error ? " error" : ""}`} value={apiKey} onChange={e=>{setApiKey(e.target.value);setError("");}} placeholder="$2a$10$..." />
          <div className="setup-label">Bin ID</div>
          <input className={`setup-input${error ? " error" : ""}`} value={binId} onChange={e=>{setBinId(e.target.value);setError("");}} placeholder="6650abc123..." onKeyDown={e=>e.key==="Enter"&&handleConfigSave()} />
          {error && <div className="error-msg">{error}</div>}
          <button className="btn-primary" onClick={handleConfigSave} disabled={loading || !apiKey.trim() || !binId.trim()}>
            {loading ? "Connecting…" : "Connect →"}
          </button>
          <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#555", marginTop: 10, lineHeight: 1.7 }}>
            Everyone uses the same Bin ID. Share it with your group once.
          </div>
        </div>
      )}

      {step === "name" && (
        <div className="setup-box">
          <div className="setup-label">Your name</div>
          <input className={`setup-input${error ? " error" : ""}`} value={name} onChange={e=>{setName(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&passwordRef.current?.focus()} placeholder="e.g. Mike, Niko, Costa…" autoFocus />
          <div className="setup-label">Password</div>
          <input ref={passwordRef} type="password" className={`setup-input${error ? " error" : ""}`} value={password} onChange={e=>{setPassword(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handleJoin()} placeholder="••••••••" />
          <div className="info-msg">New? This sets your password. Returning? Enter your existing one.</div>
          {error && <div className="error-msg">{error}</div>}
          <button className="btn-primary" onClick={handleJoin} disabled={loading || !name.trim() || !password.trim()}>
            {loading ? "Joining…" : "Enter the Haven"}
          </button>
        </div>
      )}
    </div>
  );
}

function SandwichCard({ sandwich, ratings, onRate, notes, onNote }) {
  const [open, setOpen] = useState(false);
  const score = calcScore(ratings);
  const filled = CRITERIA.filter(c => ratings && ratings[c.id]).length;
  const complete = filled === CRITERIA.length;

  return (
    <div style={{ background: "#161616", border: `1px solid ${complete ? "#EF7D0066" : "#2a2a2a"}`, borderRadius: 3, marginBottom: 8, overflow: "hidden", transition: "border-color 0.3s" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", padding: "14px 16px", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
        <div style={{ textAlign: "left", flex: 1 }}>
          <div style={{ fontFamily: "Georgia, serif", fontSize: 16, fontWeight: 700, color: complete ? "#f0f0f0" : "#ccc", letterSpacing: 1, textTransform: "uppercase" }}>{sandwich.name}</div>
          <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#888", marginTop: 4 }}>{sandwich.desc}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          {complete
            ? <div style={{ fontFamily: "'Courier New', monospace", fontSize: 20, fontWeight: 700, color: "#EF7D00" }}>{score.toFixed(1)}</div>
            : filled > 0 && <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#888" }}>{filled}/{CRITERIA.length}</div>
          }
          <div style={{ color: "#777", fontSize: 12, transform: open ? "rotate(180deg)" : "none", transition: "0.2s" }}>▼</div>
        </div>
      </button>

      {open && (
        <div style={{ padding: "0 16px 16px", borderTop: "1px solid #222" }}>
          {CRITERIA.map(c => (
            <div key={c.id} style={{ marginTop: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontFamily: "Georgia, serif", fontSize: 13, color: "#EF7D00", letterSpacing: 1, textTransform: "uppercase" }}>{c.icon} {c.label}</span>
                <span style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#777" }}>×{c.weight}%</span>
              </div>
              <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#888", marginBottom: 8 }}>{c.description}</div>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                {[1,2,3,4,5].map(n => {
                  const active = ratings && ratings[c.id] === n;
                  return (
                    <button key={n} onClick={() => onRate(c.id, n)} style={{ padding: "6px 10px", border: `1px solid ${active ? SCORE_COLORS[n-1] : "#333"}`, background: active ? SCORE_COLORS[n-1]+"22" : "transparent", color: active ? SCORE_COLORS[n-1] : "#999", cursor: "pointer", borderRadius: 2, fontFamily: "'Courier New', monospace", fontSize: 11, transition: "all 0.1s" }}>
                      {n} — {c.scale[n-1]}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{ marginTop: 14 }}>
            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#777", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Field Notes</div>
            <textarea value={notes || ""} onChange={e => onNote(e.target.value)} placeholder="Context, sauce decisions, how it held up…"
              style={{ width: "100%", minHeight: 52, background: "#0e0e0e", border: "1px solid #222", borderRadius: 2, color: "#ccc", fontFamily: "'Courier New', monospace", fontSize: 12, padding: 8, resize: "vertical" }} />
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);   // { id, name, apiKey, binId }
  const [data, setData] = useState({ raters: [] });
  const [view, setView] = useState("rate");
  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);
  const [syncError, setSyncError] = useState(false);
  const saveQueue = useRef(null);

  // Poll remote every 6s when session active
  useEffect(() => {
    if (!session) return;
    const poll = async () => {
      try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${session.binId}/latest`, { headers: { "X-Access-Key": session.apiKey } });
        if (!r.ok) { setSyncError(true); return; }
        const j = await r.json();
        if (j.record) {
          setData(prev => {
            const localMe = prev.raters.find(r => r.id === session.id);
            if (!localMe) return j.record;
            return { ...j.record, raters: (j.record.raters || []).map(r => r.id === session.id ? localMe : r) };
          });
        }
        setSyncError(false);
      } catch { setSyncError(true); }
    };
    poll();
    const id = setInterval(poll, 6000);
    return () => clearInterval(id);
  }, [session]);

  const persist = useCallback(async (newData) => {
    if (!session) return;
    setSaving(true);
    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${session.binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Access-Key": session.apiKey },
        body: JSON.stringify(newData)
      });
      if (!r.ok) { setSyncError(true); setSaving(false); return; }
      setLastSaved(new Date());
      setSyncError(false);
    } catch { setSyncError(true); }
    setSaving(false);
  }, [session]);

  const updateRater = useCallback(async (updater) => {
    setData(prev => {
      const newData = { ...prev, raters: prev.raters.map(r => r.id === session.id ? updater(r) : r) };
      persist(newData);
      return newData;
    });
  }, [session, persist]);

  const onRate = (sandwichId, criteriaId, value) => {
    updateRater(r => ({ ...r, ratings: { ...r.ratings, [sandwichId]: { ...(r.ratings[sandwichId]||{}), [criteriaId]: value } } }));
  };
  const onNote = (sandwichId, note) => {
    updateRater(r => ({ ...r, notes: { ...r.notes, [sandwichId]: note } }));
  };

  if (!session) return <SetupScreen onReady={s => { const { initialData, ...sess } = s; setSession(sess); if (initialData) setData(initialData); }} />;

  const { raters } = data;
  const me = raters.find(r => r.id === session.id) || { ratings: {}, notes: {} };
  const myIdx = raters.findIndex(r => r.id === session.id);

  const getAvg = (sid) => {
    const scores = raters.map(r => calcScore((r.ratings||{})[sid]||{})).filter(s => s !== null);
    return scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
  };

  const ranked = SPECIALTIES
    .map(s => ({ ...s, avg: getAvg(s.id), raterCount: raters.filter(r => calcScore((r.ratings||{})[s.id]||{}) !== null).length }))
    .filter(s => s.avg !== null)
    .sort((a,b) => b.avg - a.avg);

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a", paddingBottom: 60 }}>
      {/* Top bar */}
      <div style={{ borderBottom: "1px solid #222", padding: "16px 18px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
          <div>
            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#888", letterSpacing: 2, textTransform: "uppercase", marginBottom: 3 }}>242 Nassau St · Princeton, NJ</div>
            <div style={{ fontFamily: "Georgia, serif", fontSize: 22, fontWeight: 700, color: "#EF7D00", letterSpacing: 2, textTransform: "uppercase" }}>Hoagie Haven</div>
            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#aaa", letterSpacing: 2, textTransform: "uppercase" }}>Specialty Ranking Rubric</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap", justifyContent: "flex-end" }}>
              {raters.map((r, idx) => (
                <div key={r.id} style={{ padding: "4px 9px", border: `1px solid ${raterColor(idx)}${r.id === session.id ? "cc" : "44"}`, background: r.id === session.id ? raterColor(idx)+"20" : "transparent", color: r.id === session.id ? raterColor(idx) : "#777", fontFamily: "'Courier New', monospace", fontSize: 11, borderRadius: 2, letterSpacing: 1 }}>
                  {r.name}
                </div>
              ))}
            </div>
            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: syncError ? "#e05252" : saving ? "#888" : lastSaved ? "#555" : "#333" }}>
              {syncError ? "sync error" : saving ? "saving…" : lastSaved ? "synced ✓" : ""}
            </div>
          </div>
        </div>
        <div style={{ fontFamily: "'Courier New', monospace", fontSize: 12, color: raterColor(myIdx), letterSpacing: 1, marginBottom: 10 }}>
          ▶ Rating as: {session.name}
        </div>
        <div style={{ display: "flex" }}>
          {["rate","rank"].map(v => (
            <button key={v} onClick={() => setView(v)} style={{ padding: "9px 18px 8px", border: "none", background: "none", cursor: "pointer", fontFamily: "'Courier New', monospace", fontSize: 12, letterSpacing: 2, textTransform: "uppercase", color: view===v ? "#EF7D00" : "#888", borderBottom: view===v ? "2px solid #EF7D00" : "2px solid transparent", transition: "all 0.15s" }}>
              {v==="rate" ? `Rate (${session.name})` : `Leaderboard${ranked.length > 0 ? ` (${ranked.length})` : ""}`}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 18px 0" }}>
        {view === "rate" && (
          <>
            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#888", marginBottom: 14, lineHeight: 1.8 }}>
              Rating as <span style={{ color: raterColor(myIdx) }}>{session.name}</span> — tap a sandwich to rate across 6 weighted criteria. Scores out of 100.
            </div>
            {SPECIALTIES.map(s => (
              <SandwichCard key={s.id} sandwich={s}
                ratings={(me.ratings||{})[s.id]||{}} onRate={(cid,val) => onRate(s.id,cid,val)}
                notes={(me.notes||{})[s.id]||""} onNote={note => onNote(s.id,note)} />
            ))}
          </>
        )}

        {view === "rank" && (
          ranked.length === 0
            ? <div style={{ fontFamily: "'Courier New', monospace", fontSize: 13, color: "#888", marginTop: 40, textAlign: "center", lineHeight: 2 }}>No sandwiches fully rated yet.<br/>Head to Rate to get started.</div>
            : <>
                <div style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#888", marginBottom: 16, lineHeight: 1.8 }}>
                  Averaged across {raters.length} rater{raters.length!==1?"s":""}: {raters.map((r,i)=><span key={r.id} style={{color:raterColor(i)}}>{r.name}{i<raters.length-1?", ":""}</span>)}
                </div>
                {ranked.map((s,i) => {
                  const medal = ["🥇","🥈","🥉"][i] || `#${i+1}`;
                  const rs = raters.map((r,ri)=>({name:r.name,color:raterColor(ri),score:calcScore((r.ratings||{})[s.id]||{})})).filter(x=>x.score!==null);
                  return (
                    <div key={s.id} style={{ marginBottom: 10, padding: "14px 16px", background: i===0?"#160e00":"#111", border: `1px solid ${i===0?"#EF7D0044":"#222"}`, borderRadius: 3 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ fontSize: 18 }}>{medal}</span>
                          <div>
                            <div style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 15, color: "#f0f0f0", letterSpacing: 1, textTransform: "uppercase" }}>{s.name}</div>
                            <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#888", marginTop: 3 }}>{s.raterCount} of {raters.length} rated</div>
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontFamily: "'Courier New', monospace", fontSize: 22, fontWeight: 700, color: "#EF7D00" }}>{s.avg.toFixed(1)}</div>
                          <div style={{ fontFamily: "'Courier New', monospace", fontSize: 10, color: "#888" }}>avg</div>
                        </div>
                      </div>
                      <div style={{ height: 2, background: "#222", borderRadius: 2, overflow: "hidden", marginBottom: 10 }}>
                        <div style={{ height: "100%", width: `${s.avg}%`, background: i===0?"linear-gradient(90deg,#EF7D00,#FF9A30)":"#333", borderRadius: 2, transition: "width 0.5s ease" }} />
                      </div>
                      {rs.length > 1 && (
                        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 6 }}>
                          {rs.map(x=><div key={x.name} style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: x.color, border: `1px solid ${x.color}44`, padding: "3px 8px", borderRadius: 2 }}>{x.name}: {x.score.toFixed(1)}</div>)}
                        </div>
                      )}
                      {raters.map((r,ri) => (r.notes||{})[s.id]
                        ? <div key={r.id} style={{ fontFamily: "'Courier New', monospace", fontSize: 11, color: "#aaa", marginTop: 5 }}><span style={{color:raterColor(ri)}}>{r.name}:</span> "{r.notes[s.id]}"</div>
                        : null)}
                    </div>
                  );
                })}
              </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
